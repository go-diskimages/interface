name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  native:
    name: native ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: build
        run: CGO_ENABLED=0 go build ./...
      - name: test
        run: CGO_ENABLED=0 go test -cover ./...

  emulated:
    name: emulated ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            image: debian:trixie
            qemu_cpu: rv64,v=true,vlen=128
          - arch: loong64
            image: ghcr.io/loong64/debian:trixie
            qemu_cpu: la464
          - arch: ppc64le
            image: debian:trixie
            qemu_cpu: power9
          - arch: s390x
            image: debian:trixie
            qemu_cpu: qemu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: register binfmt handlers
        run: docker run --privileged --rm tonistiigi/binfmt --install all
      - name: cross-compile test binaries
        run: |
          set -euo pipefail
          mkdir -p testbins
          for pkg in $(go list ./...); do
            out="testbins/$(echo "$pkg" | tr '/' '_').test"
            if CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
                go test -c -cover -o "$out" "$pkg" 2>/dev/null; then
              echo "built $out for $pkg"
            else
              echo "no test binary for $pkg (no tests); skipping"
            fi
          done
      - name: run test binaries under qemu
        run: |
          set -euo pipefail
          shopt -s nullglob
          bins=(testbins/*.test)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "no test binaries to run"; exit 0
          fi
          for bin in "${bins[@]}"; do
            echo "::group::run $bin (${{ matrix.arch }})"
            docker run --rm \
              --platform linux/${{ matrix.arch }} \
              -e QEMU_CPU='${{ matrix.qemu_cpu }}' \
              -v "$PWD:/work" -w /work \
              ${{ matrix.image }} \
              "/$bin" -test.v
            echo "::endgroup::"
          done
